name: Daily News Aggregation

on:
  schedule:
    - cron: '5 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create config file
      run: |
        cat > config.json << EOF
        {
          "cypher_api_key": "${{ secrets.CYPHER_API_KEY }}",
          "newsapi_key": "${{ secrets.NEWSAPI_KEY }}",
          "hours_back": 24,
          "story_limit": 150,
          "log_level": "INFO",
          "log_file": "logs/cronkite.log",
          "log_format": "%(asctime)s - %(name)s - %(levelname)s - %(message)s",
          "disable_console": true
        }
        EOF

    - name: Create directories
      run: |
        mkdir -p logs
        mkdir -p reports

    - name: Run news aggregator
      id: run-aggregator
      shell: bash {0}
      run: |
        python cronkite.py > news_report.txt
        echo "exit_code=$?" >> $GITHUB_OUTPUT

    - name: Get current date
      id: date
      run: |
        echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "display_date=$(date -u +'%B %-d, %Y')" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

    - name: Save report file
      run: cp news_report.txt "reports/${{ steps.date.outputs.date }}.md"

    - name: Update README
      run: |
        REPORT_DATE="${{ steps.date.outputs.display_date }}"
        REPORT_LINK="reports/${{ steps.date.outputs.date }}.md"
        TIMESTAMP="${{ steps.date.outputs.timestamp }}"

        python3 << 'PYEOF'
        import os, re

        report_date = os.environ["REPORT_DATE"]
        report_link = os.environ["REPORT_LINK"]
        timestamp = os.environ["TIMESTAMP"]

        with open("README.md", "r") as f:
            readme = f.read()

        new_section = (
            "## 📰 Latest Report\n\n"
            f"**[{report_date}]({report_link})**\n\n"
            f"*Last updated: {timestamp} · Generated daily at 6:05 AM EST*\n\n"
            "Browse all past reports in the [`reports/`](reports/) directory."
        )

        pattern = r"## 📰 Latest Report.*?(?=\n## (?!📰))"
        readme = re.sub(pattern, new_section + "\n\n", readme, flags=re.DOTALL)

        with open("README.md", "w") as f:
            f.write(readme)
        PYEOF

      env:
        REPORT_DATE: ${{ steps.date.outputs.display_date }}
        REPORT_LINK: reports/${{ steps.date.outputs.date }}.md
        TIMESTAMP: ${{ steps.date.outputs.timestamp }}

    - name: Commit and push
      run: |
        git config --local user.email "git@knock.email"
        git config --local user.name "GitHub Action"
        git add "reports/${{ steps.date.outputs.date }}.md" README.md
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Daily report: ${{ steps.date.outputs.display_date }}"
          git push
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-news-report-${{ steps.date.outputs.date }}
        path: news_report.txt
        retention-days: 30
        if-no-files-found: error

    - name: Summary
      run: |
        echo "## Daily News Aggregation Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** ${{ steps.date.outputs.display_date }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status:** ${{ steps.run-aggregator.outputs.exit_code == '0' && '✅ Success' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
        echo "**Report:** [reports/${{ steps.date.outputs.date }}.md](reports/${{ steps.date.outputs.date }}.md)" >> $GITHUB_STEP_SUMMARY
